<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <main class="container">
    <article class="card" data-testid="test-todo-card">

      <!-- Header -->
      <header class="card-header">
        <input type="checkbox" id="complete" data-testid="test-todo-complete-toggle" />
        <label for="complete" class="checkbox-label">
          Mark as complete
        </label>
      </header>

      <!-- Title -->
      <h3 data-testid="test-todo-title" class="title">
        Build Portfolio Website
      </h3>

      <!-- Description -->
      <p data-testid="test-todo-description" class="description">
        Create a modern portfolio using Nuxt and deploy it.
      </p>

      <!-- Meta -->
      <div class="meta">
        <span data-testid="test-todo-priority" class="badge high">
          High
        </span>

        <span data-testid="test-todo-status" class="badge status">
          In Progress
        </span>
      </div>

      <!-- Dates -->
      <div class="dates">
        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00">
          Due April 16, 2026
        </time>

        <p data-testid="test-todo-time-remaining" id="time-remaining"></p>
      </div>

      <!-- Tags -->
      <ul data-testid="test-todo-tags" class="tags">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
        <li>design</li>
      </ul>

      <!-- Actions -->
      <div class="actions">
        <button data-testid="test-todo-edit-button">Edit</button>
        <button data-testid="test-todo-delete-button">Delete</button>
      </div>

    </article>
  </main>

  <script src="script.js"></script>
</body>

</html>
